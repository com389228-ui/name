name: Build Complete APK with OneSignal

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Regenerate Clean Project
        run: flutter create . --org com.shivzo --project-name app --overwrite

      - name: Add Packages
        run: |
          flutter pub add webview_flutter
          flutter pub add webview_flutter_android
          flutter pub add permission_handler
          flutter pub add onesignal_flutter
          flutter pub add shared_preferences

      - name: Fix Kotlin Gradle Configuration for OneSignal
        run: |
          if [ -f "android/settings.gradle" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.20"/g' android/settings.gradle || true
          fi

      - name: Set minSdkVersion to 21
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle

      - name: Write AndroidManifest.xml
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:label="Shivzo"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Write main.dart
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:onesignal_flutter/onesignal_flutter.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                debugShowCheckedModeBanner: false,
                home: WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              
              final WebViewController controller = WebViewController();

              controller
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFFFFFFFF))
                ..loadRequest(Uri.parse('https://shivzo.in'));

              if (controller.platform is AndroidWebViewController) {
                final AndroidWebViewController androidController =
                    controller.platform as AndroidWebViewController;
                
                androidController.setMediaPlaybackRequiresUserGesture(false);
                
                androidController.setGeolocationPermissionsPromptCallbacks(
                  onShowPrompt: (request) async {
                    return const GeolocationPermissionsResponse(
                      allow: true,
                      retain: true,
                    );
                  },
                );
              }

              this.controller = controller;

              WidgetsBinding.instance.addPostFrameCallback((_) async {
                await _requestPermissions();
                await _setupOneSignal();
              });
            }

            void _showTokenPopup(String id) {
              if (!mounted) return;
              showDialog(
                context: context,
                barrierDismissible: false,
                builder: (context) => AlertDialog(
                  title: const Text("OneSignal Player ID"),
                  content: SelectableText(id),
                  actions: [
                    TextButton(
                      onPressed: () => Navigator.pop(context),
                      child: const Text("OK"),
                    ),
                  ],
                ),
              );
            }

            Future<void> _setupOneSignal() async {
              try {
                OneSignal.Debug.setLogLevel(OSLogLevel.verbose);
                OneSignal.initialize("85fa9f94-5bdb-4076-a585-6327f3934e2f");
                
                await OneSignal.Notifications.requestPermission(true);

                Future.delayed(const Duration(seconds: 3), () {
                  String? onesignalId = OneSignal.User.pushSubscription.id;
                  if (onesignalId != null && onesignalId.isNotEmpty) {
                    _showTokenPopup("OneSignal ID:\n$onesignalId");
                  }
                });
              } catch (e) {
                debugPrint("OneSignal setup error: \$e");
              }
            }

            Future<void> _requestPermissions() async {
              await [
                Permission.notification,
                Permission.location,
              ].request();
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvoked: (didPop) async {
                  if (didPop) return;
                  if (await controller.canGoBack()) {
                    controller.goBack();
                  } else {
                    if (context.mounted) {
                      Navigator.of(context).pop();
                    }
                  }
                },
                child: Scaffold(
                  body: SafeArea(
                    child: WebViewWidget(controller: controller),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build Optimized APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivzo-onesignal-release
          path: build/app/outputs/flutter-apk/app-release.apk
