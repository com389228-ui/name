            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: controller),
                ),
              );
            }
          }
          EOF

      # 7. APK बनाना
      - name: Build APK
        run: flutter build apk --release

      # 8. APK डाउनलोड के लिए उपलब्ध कराना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivzo-release
          path: build/app/outputs/flutter-apk/app-release.apk

            @override
            void initState() {
              super.initState();
              
              // ऐप खुलते ही परमिशन पॉप-अप दिखाएगा
              _requestPermissions();

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('https://shivzo.in'));
            }

            // परमिशन मांगने का फ़ंक्शन
            Future<void> _requestPermissions() async {
              await [
                Permission.notification,
                Permission.location,
              ].request();
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: controller),
                ),
              );
            }
          }
          EOF

      # 5. APK बनाना
      - name: Build APK
        run: flutter build apk --release

