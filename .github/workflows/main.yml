                ),
              );
            }
          }
          EOF

      # 6. Build Release APK
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivzo-release
          path: build/app/outputs/flutter-apk/app-release.apk
