name: Build Shivzo Compact APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      # 1. Clean Project बनाना
      - name: Regenerate Clean Project
        run: flutter create . --org com.shivzo --project-name app --overwrite

      # 2. Add Packages
      - name: Add Packages
        run: |
          flutter pub add webview_flutter
          flutter pub add webview_flutter_android
          flutter pub add permission_handler
          flutter pub add firebase_core
          flutter pub add firebase_messaging
          flutter pub add flutter_local_notifications
          flutter pub add shared_preferences

      # 3. Setup Google Services JSON
      - name: Setup Google Services JSON
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "google-services.json copied to android/app/"
          else
            echo "Warning: google-services.json not found in root, proceeding anyway..."
          fi

      # 4. Write AndroidManifest.xml
      - name: Write AndroidManifest.xml
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:label="Shivzo"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  
                  <meta-data
                      android:name="com.google.firebase.messaging.default_notification_channel_id"
                      android:value="high_importance_channel" />

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      # 4.5. Set minSdkVersion to 21
      - name: Set minSdkVersion to 21
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle

      # 5. Write main.dart
      - name: Write main.dart
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:firebase_core/firebase_core.dart';
          import 'package:firebase_messaging/firebase_messaging.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          const AndroidNotificationChannel channel = AndroidNotificationChannel(
            'high_importance_channel',
            'High Importance Notifications',
            description: 'This channel is used for important notifications.',
            importance: Importance.max,
            playSound: true,
          );

          final FlutterLocalNotificationsPlugin flutterLocalNotificationsPlugin =
              FlutterLocalNotificationsPlugin();

          @pragma('vm:entry-point')
          Future<void> _firebaseMessagingBackgroundHandler(RemoteMessage message) async {
            await Firebase.initializeApp();
            debugPrint("Background Message Received: ${message.messageId}");
          }

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            try {
              await Firebase.initializeApp();
              FirebaseMessaging.onBackgroundMessage(_firebaseMessagingBackgroundHandler);

              await flutterLocalNotificationsPlugin
                  .resolvePlatformSpecificImplementation<
                      AndroidFlutterLocalNotificationsPlugin>()
                  ?.createNotificationChannel(channel);

              await FirebaseMessaging.instance.setForegroundNotificationPresentationOptions(
                alert: true,
                badge: true,
                sound: true,
              );
            } catch (e) {
              debugPrint("Firebase init error: $e");
            }
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                debugShowCheckedModeBanner: false,
                home: WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatelessWidget {
            const WebViewScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return const Scaffold(
                body: SafeArea(
                  child: WebViewWidgetContainer(),
                ),
              );
            }
          }

          class WebViewWidgetContainer extends StatefulWidget {
            const WebViewWidgetContainer({super.key});

            @override
            State<WebViewWidgetContainer> createState() => _WebViewWidgetContainerState();
          }

          class _WebViewWidgetContainerState extends State<WebViewWidgetContainer> {
            late final WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              _requestPermissions();
              _setupFirebaseMessaging();

              final WebViewController controller = WebViewController();

              controller
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFFFFFFFF))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                  ),
                )
                ..loadRequest(Uri.parse('https://shivzo.in'));

              // 🔥 CACHE, SESSION और DOM STORAGE (LOCAL STORAGE) चालू करने का कोड:
              if (controller.platform is AndroidWebViewController) {
                final AndroidWebViewController androidController =
                    controller.platform as AndroidWebViewController;
                
                androidController.setMediaPlaybackRequiresUserGesture(false);
                
                // WebView में LocalStorage और Cache इनेबल करना
                androidController.setGeolocationPermissionsPromptCallbacks(
                  onShowPrompt: (request) async {
                    return const GeolocationPermissionsResponse(
                      allow: true,
                      retain: true,
                    );
                  },
                );
              }

              this.controller = controller;
            }

            void _setupFirebaseMessaging() async {
              try {
                FirebaseMessaging messaging = FirebaseMessaging.instance;
                
                await messaging.requestPermission(alert: true, badge: true, sound: true);

                const AndroidInitializationSettings initializationSettingsAndroid =
                    AndroidInitializationSettings('@mipmap/ic_launcher');
                const InitializationSettings initializationSettings =
                    InitializationSettings(android: initializationSettingsAndroid);
                
                await flutterLocalNotificationsPlugin.initialize(initializationSettings);

                String? token = await messaging.getToken();
                
                if (token != null && token.isNotEmpty) {
                  debugPrint("SHIVZO FCM TOKEN: $token");
                  final SharedPreferences prefs = await SharedPreferences.getInstance();
                  await prefs.setString('fcm_token', token);
                }

                messaging.onTokenRefresh.listen((newToken) async {
                  final SharedPreferences prefs = await SharedPreferences.getInstance();
                  await prefs.setString('fcm_token', newToken);
                });

                FirebaseMessaging.onMessage.listen((RemoteMessage message) {
                  RemoteNotification? notification = message.notification;
                  AndroidNotification? android = message.notification?.android;

                  if (notification != null && android != null) {
                    flutterLocalNotificationsPlugin.show(
                      notification.hashCode,
                      notification.title,
                      notification.body,
                      NotificationDetails(
                        android: AndroidNotificationDetails(
                          channel.id,
                          channel.name,
                          channelDescription: channel.description,
                          icon: '@mipmap/ic_launcher',
                          importance: Importance.max,
                          priority: Priority.high,
                          playSound: true,
                        ),
                      ),
                    );
                  }
                });

              } catch (e) {
                debugPrint("Messaging setup error: $e");
              }
            }

            Future<void> _requestPermissions() async {
              await [
                Permission.notification,
                Permission.location,
              ].request();
            }

            @override
            Widget build(BuildContext context) {
              return Stack(
                children: [
                  WebViewWidget(controller: controller),
                  if (isLoading)
                    const Center(
                      child: CircularProgressIndicator(
                        color: Colors.orange,
                      ),
                    ),
                ],
              );
            }
          }
          EOF

      # 6. Build Optimized & Small APK
      - name: Build Optimized APK
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      # 7. Upload Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivzo-release-small
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
